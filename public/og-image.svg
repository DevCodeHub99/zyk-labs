<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">

  <!-- ================= Background ================= -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="60%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <radialGradient id="glow" cx="75%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"></stop>
    </radialGradient>

    <!-- ORIGINAL LOGO GRADIENT -->
    <linearGradient id="zykGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="50%" stop-color="#3B82F6"></stop>
      <stop offset="100%" stop-color="#06B6D4"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"></rect>
  <rect width="1200" height="630" fill="url(#glow)"></rect>

  <!-- ================= LOGO (INLINE SVG) ================= -->
  <g transform="translate(100,130) scale(1.6)">

    <!-- prompt -->
    <text x="10" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="32" font-weight="700" fill="#10B981">
      &gt;
    </text>

    <!-- { -->
    <text x="35" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="900" fill="#e2e8f0">
      {
    </text>

    <!-- zyk -->
    <text x="55" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="900" fill="url(#zykGradient)">
      zyk
    </text>

    <!-- } -->
    <text x="112" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="900" fill="#e2e8f0">
      }
    </text>

    <!-- labs -->
    <text x="130" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" font-weight="500" fill="#94a3b8">
      labs
    </text>

    <!-- cursor (static for OG compatibility) -->
    <rect x="195" y="28" width="3" height="28" fill="#3B82F6"></rect>

  </g>

  <!-- ================= HEADLINE ================= -->
  <text x="100" y="360" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">
        Software that solves
  </text>

  <text x="100" y="430" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">
        real problems.
  </text>

  <!-- ================= SUBTEXT ================= -->
  <text x="100" y="510" font-family="Inter, Arial, sans-serif" font-size="30" fill="#94a3b8">
        Custom Websites • E-Commerce • Custom Business Solutions • AI Products
  </text>

  <!-- ================= URL ================= -->
  <text x="100" y="560" font-family="Inter, Arial, sans-serif" font-size="24" fill="#64748b">
        zyklabs.in
  </text>

</svg>