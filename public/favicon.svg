<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

<title>TechBuild Labs</title>

<defs>
  <linearGradient id="zykGradient" x1="0%" x2="100%">
    <stop offset="0%" stop-color="#2563EB"></stop>
    <stop offset="100%" stop-color="#06B6D4"></stop>
  </linearGradient>

  <style>
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      text-anchor: middle;
    }
  </style>
</defs>

<!-- background -->
<rect width="64" height="64" rx="14" fill="#333333"></rect>

<!-- {zyk} -->
<text x="12" y="30" class="mono" font-size="22" font-weight="900" fill="white">
  {
</text>

<text x="32" y="30" class="mono" font-size="22" font-weight="900" fill="url(#zykGradient)">
  zyk
</text>

<text x="52" y="30" class="mono" font-size="22" font-weight="900" fill="white">
  }
</text>

<!-- labs (subheading) -->
<text x="32" y="48" class="mono" font-size="12" font-weight="600" fill="#cbd5e1">
  labs
</text>

</svg>